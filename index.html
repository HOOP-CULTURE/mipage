<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOOP CULTURE</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif}
body{background:#0a0a0a;color:white}

/* NAV */
nav{
position:fixed;width:100%;
display:flex;justify-content:space-between;
padding:20px 60px;
background:rgba(0,0,0,0.7);
z-index:1000;
}
nav a{color:white;margin-left:20px;text-decoration:none}

/* HERO */
.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=2070') center/cover;
display:flex;align-items:center;justify-content:center;
text-align:center;
}
.hero h1{font-size:75px}

/* SECTION */
.section{padding:120px 60px}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

/* CARD */
.card{
background:#111;border-radius:15px;
overflow:hidden;
transition:0.4s;
}
.card:hover{transform:translateY(-10px)}

.card img{
width:100%;height:260px;
object-fit:cover;
}

.info{padding:15px}
.price{color:#00ff88}

/* BANNER */
.banner{
height:250px;
background:url('https://images.unsplash.com/photo-1519861531473-9200262188bf') center/cover;
display:flex;align-items:center;justify-content:center;
font-size:40px;font-weight:900;
}

/* PAYMENTS */
.payments{
display:flex;
justify-content:center;
gap:40px;
margin-top:30px;
}
.payments img{
width:80px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;right:20px;
background:#25D366;
padding:15px;border-radius:50%;
color:white;text-decoration:none;
}

/* FOOTER */
footer{text-align:center;padding:40px;background:black}

</style>
</head>

<body>

<nav>
<h2>HOOP CULTURE</h2>
<div>
<a href="#">Inicio</a>
<a href="#productos">Productos</a>
<a href="#inspo">Inspiración</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<h1>DE LA CANCHA A LA CALLE</h1>
</section>

<!-- PRODUCTOS -->
<section id="productos" class="section">
<h2>COLECCIÓN</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
<div class="info">
<h3>Zapatilla Basketball Pro</h3>
<p class="price">S/ 450</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a">
<div class="info">
<h3>Adidas Hoops</h3>
<p class="price">S/ 380</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1528701800489-20be3c92f0bb">
<div class="info">
<h3>Urban Street</h3>
<p class="price">S/ 250</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1584735175097-719d848f8449">
<div class="info">
<h3>Elite Performance</h3>
<p class="price">S/ 520</p>
</div>
</div>

</div>

</section>

<!-- BANNER -->
<section class="banner">
NEW DROP 🔥
</section>

<!-- INSPIRACION -->
<section id="inspo" class="section">
<h2>INSPIRACIÓN</h2>

<div class="grid">

<img src="https://images.unsplash.com/photo-1517649763962-0c623066013b">
<img src="https://images.unsplash.com/photo-1546519638-68e109498ffc">
<img src="https://images.unsplash.com/photo-1519861531473-9200262188bf">

</div>

</section>

<!-- PAGOS -->
<section class="section">
<h2 style="text-align:center">MÉTODOS DE PAGO</h2>

<div class="payments">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Yape_logo.png">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Plin_logo.png">
</div>

</section>

<footer>
<p>© 2026 HOOP CULTURE</p>
</footer>

<a class="whatsapp" href="https://wa.me/51999999999">💬</a>

</body>
</html>
