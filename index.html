<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOOP CULTURE</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif}
body{background:#0a0a0a;color:white}

/* NAV */
nav{
position:fixed;width:100%;
display:flex;justify-content:space-between;
padding:20px 60px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:1000;
}
nav a{color:white;margin-left:20px;text-decoration:none}
nav a:hover{color:#00ff88}

/* HERO */
.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=2070') center/cover;
display:flex;align-items:center;justify-content:center;
text-align:center;
}
.hero h1{font-size:75px;font-weight:900}
.hero p{opacity:0.8;margin-top:10px}

.btn{
margin-top:20px;padding:15px 35px;
background:#00ff88;border:none;
font-weight:700;cursor:pointer;
}
.btn:hover{transform:scale(1.1)}

/* SECTION */
.section{padding:100px 60px}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

/* CARD */
.card{
background:#111;border-radius:15px;
overflow:hidden;transition:0.4s;
}
.card:hover{transform:translateY(-10px)}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.info{padding:15px}
.price{color:#00ff88;margin:10px 0}

/* PLAYERS */
.players{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}
.player img{
width:100%;height:400px;object-fit:cover;
border-radius:10px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;right:20px;
background:#25D366;
padding:15px;border-radius:50%;
color:white;text-decoration:none;
font-size:20px;
}

/* FOOTER */
footer{text-align:center;padding:30px;background:black}

</style>
</head>

<body>

<nav>
<h2>HOOP CULTURE</h2>
<div>
<a href="#">Inicio</a>
<a href="#productos">Productos</a>
<a href="#jugadores">Jugadores</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div>
<h1>DE LA CANCHA A LA CALLE</h1>
<p>Estilo. Juego. Cultura.</p>
<button class="btn" onclick="scrollToProducts()">Explorar</button>
</div>
</section>

<!-- PRODUCTOS -->
<section id="productos" class="section">
<h2>COLECCIÓN PREMIUM</h2>

<div class="grid">

<div class="card">
<img src="https://images.stockx.com/images/Nike-LeBron-20-Time-Machine.png">
<div class="info">
<h3>Nike LeBron 20</h3>
<p class="price">S/ 650</p>
<button onclick="buy('LeBron 20',650)">Comprar</button>
</div>
</div>

<div class="card">
<img src="https://images.stockx.com/images/Air-Jordan-1-High-OG-Chicago.png">
<div class="info">
<h3>Air Jordan 1 Chicago</h3>
<p class="price">S/ 900</p>
<button onclick="buy('Jordan 1',900)">Comprar</button>
</div>
</div>

<div class="card">
<img src="https://images.stockx.com/images/Nike-Kyrie-Infinity.png">
<div class="info">
<h3>Kyrie Infinity</h3>
<p class="price">S/ 550</p>
<button onclick="buy('Kyrie',550)">Comprar</button>
</div>
</div>

</div>

<p style="text-align:center;margin-top:30px;color:#aaa">
Aceptamos pagos por Yape, Plin y transferencia bancaria.
</p>

</section>

<!-- JUGADORES -->
<section id="jugadores" class="section">
<h2>INSPIRACIÓN</h2>

<div class="players">

<div class="player">
<img src="https://images.unsplash.com/photo-1517649763962-0c623066013b">
</div>

<div class="player">
<img src="https://images.unsplash.com/photo-1546519638-68e109498ffc">
</div>

<div class="player">
<img src="https://images.unsplash.com/photo-1519861531473-9200262188bf">
</div>

</div>

</section>

<footer>
<p>© 2026 HOOP CULTURE</p>
</footer>

<a class="whatsapp" href="https://wa.me/51999999999">💬</a>

<script>
function scrollToProducts(){
document.getElementById("productos").scrollIntoView({behavior:"smooth"});
}

function buy(name,price){
let msg = `Hola, quiero comprar ${name} - S/ ${price}. Pago con Yape o Plin.`;
window.open(`https://wa.me/51999999999?text=${msg}`);
}
</script>

</body>
</html>
